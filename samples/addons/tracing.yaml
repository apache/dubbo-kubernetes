apiVersion: v1
kind: ServiceAccount
metadata:
  name: tracing
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: tracing
    app.kubernetes.io/part-of: dubbo-observability
---
apiVersion: v1
kind: Service
metadata:
  name: tracing
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: tracing
    app.kubernetes.io/part-of: dubbo-observability
spec:
  selector:
    app.kubernetes.io/name: tracing
  ports:
  - name: http-query
    port: 16686
    targetPort: http-query
    protocol: TCP
  - name: grpc-otlp
    port: 4317
    targetPort: grpc-otlp
    protocol: TCP
  - name: http-otlp
    port: 4318
    targetPort: http-otlp
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracing
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: tracing
    app.kubernetes.io/part-of: dubbo-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tracing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tracing
        app.kubernetes.io/part-of: dubbo-observability
    spec:
      serviceAccountName: tracing
      containers:
      - name: jaeger
        image: docker.io/jaegertracing/all-in-one:1.60
        imagePullPolicy: IfNotPresent
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        - name: QUERY_BASE_PATH
          value: /
        ports:
        - name: http-query
          containerPort: 16686
          protocol: TCP
        - name: grpc-otlp
          containerPort: 4317
          protocol: TCP
        - name: http-otlp
          containerPort: 4318
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http-query
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: http-query
          initialDelaySeconds: 20
          periodSeconds: 15
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
