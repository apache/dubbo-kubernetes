apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dubbo-observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dubbo-observability
data:
  grafana.ini: |
    [analytics]
    check_for_updates = false
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      uid: prometheus
      type: prometheus
      access: proxy
      orgId: 1
      url: http://prometheus.dubbo-system.svc:9090
      isDefault: true
      editable: true
      jsonData:
        timeInterval: 15s
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
    - name: dubbo
      orgId: 1
      folder: Dubbo
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/dubbo
---
