apiVersion: v1
kind: ServiceAccount
metadata:
  name: opentelemetry-collector
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/part-of: dubbo-observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opentelemetry-collector
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/part-of: dubbo-observability
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-collector
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/part-of: dubbo-observability
spec:
  selector:
    app.kubernetes.io/name: opentelemetry-collector
  ports:
  - name: grpc-otlp
    port: 4317
    targetPort: grpc-otlp
    protocol: TCP
  - name: http-otlp
    port: 4318
    targetPort: http-otlp
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-collector
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/part-of: dubbo-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/part-of: dubbo-observability
    spec:
      serviceAccountName: opentelemetry-collector
      containers:
      - name: collector
        image: otel/opentelemetry-collector-contrib:0.128.0
        imagePullPolicy: IfNotPresent
        args:
        - --config=/etc/otelcol/collector.yaml
        ports:
        - name: grpc-otlp
          containerPort: 4317
          protocol: TCP
        - name: http-otlp
          containerPort: 4318
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: grpc-otlp
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: grpc-otlp
          initialDelaySeconds: 20
          periodSeconds: 15
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/otelcol
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: opentelemetry-collector
