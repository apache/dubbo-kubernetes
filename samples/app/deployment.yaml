---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx
  namespace: app
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: app
  labels:
    app: nginx
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-v1
  namespace: app
data:
  index.html: |
    nginx v1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-v2
  namespace: app
data:
  index.html: |
    nginx v2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-v1
  namespace: app
  labels:
    app: nginx
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
      version: v1
  template:
    metadata:
      labels:
        app: nginx
        version: v1
    spec:
      serviceAccountName: nginx
      containers:
      - name: app
        image: nginx:1.27-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: nginx-index
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        env:
        - name: SERVICE_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['version']
        - name: SERVICE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SERVICE_PORT
          value: "80"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
      volumes:
      - name: nginx-index
        configMap:
          name: nginx-v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-v2
  namespace: app
  labels:
    app: nginx
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
      version: v2
  template:
    metadata:
      labels:
        app: nginx
        version: v2
    spec:
      serviceAccountName: nginx
      containers:
      - name: app
        image: nginx:1.27-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: nginx-index
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        env:
        - name: SERVICE_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['version']
        - name: SERVICE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SERVICE_PORT
          value: "80"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
      volumes:
      - name: nginx-index
        configMap:
          name: nginx-v2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-consumer
  namespace: app
  labels:
    app: nginx-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-consumer
  template:
    metadata:
      labels:
        app: nginx-consumer
        role: consumer
    spec:
      serviceAccountName: nginx
      containers:
      - name: app
        image: kdubbo/dubbod:debug
        imagePullPolicy: Always
