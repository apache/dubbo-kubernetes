apiVersion: v1
kind: ServiceAccount
metadata:
  name: moviereview
  namespace: moviereview
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: moviereview
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: moviepage
  ports:
  - name: http
    port: 80
    targetPort: 9080
    nodePort: 30080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: moviepage
  namespace: moviereview
  labels:
    app: moviepage
spec:
  selector:
    app: moviepage
  ports:
  - name: http
    port: 9080
    targetPort: 9080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: details
  namespace: moviereview
  labels:
    app: details
spec:
  selector:
    app: details
  ports:
  - name: http
    port: 9080
    targetPort: 9080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: reviews
  namespace: moviereview
  labels:
    app: reviews
spec:
  selector:
    app: reviews
  ports:
  - name: http
    port: 9080
    targetPort: 9080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: ratings
  namespace: moviereview
  labels:
    app: ratings
spec:
  selector:
    app: ratings
  ports:
  - name: http
    port: 9080
    targetPort: 9080
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moviepage
  namespace: moviereview
  labels:
    app: moviepage
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moviepage
      version: v1
  template:
    metadata:
      labels:
        app: moviepage
        version: v1
    spec:
      serviceAccountName: moviereview
      containers:
      - name: app
        image: kdubbo/moviereview-moviepage:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 9080
          protocol: TCP
        env:
        - name: DETAILS_URL
          value: http://details:9080/details
        - name: REVIEWS_URL
          value: http://reviews:9080/reviews
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: details
  namespace: moviereview
  labels:
