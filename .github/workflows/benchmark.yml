name: Performance Benchmarks

on:
  schedule:
    - cron: '0 4 * * 3'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Control-Plane Scale Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.repository == 'apache/dubbo-kubernetes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Capture benchmark environment
        run: |
          {
            go version
            go env GOOS GOARCH
            uname -a
            lscpu
          } > benchmark-environment.txt

      - name: Run benchmark matrix
        run: make benchmark BENCHMARK_COUNT=5 BENCHMARK_TIME=1s BENCHMARK_CPU=1 | tee benchmark-results.txt

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: control-plane-benchmarks-${{ github.run_id }}
          path: |
            benchmark-environment.txt
            benchmark-results.txt
          retention-days: 30
