name: Dubbo Kubernetes Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "${TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be numeric semantic version (for example, 0.4.3): ${TAG}" >&2
            exit 1
          fi

      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping creation."
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --prerelease \
              --generate-notes
          fi

  build_and_upload:
    name: Build and Upload Binaries
    needs: create_release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [386, amd64, arm64]
        exclude:
          - goos: darwin
            goarch: 386
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build dubboctl and samples
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GIT_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p build/dubboctl
          make build-dubboctl GOOS="${GOOS}" GOARCH="${GOARCH}" GIT_VERSION="${GIT_VERSION}"
          make clone-sample
          cp README.md LICENSE build/
          cp README.md LICENSE build/dubboctl/
          mv bin/dubboctl* build/dubboctl/
          mv bin/samples/ build/
          ls -ln build/dubboctl/ ; ls -ln build/

      - name: Rename windows binary
        if: matrix.goos == 'windows'
        run: |
          cp build/dubboctl/dubboctl build/dubboctl/dubboctl.exe

      - name: Package dubboctl
        id: package_ctl
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FILENAME="dubboctl-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          DIRNAME="dubboctl-${VERSION}"
          mkdir -p "${DIRNAME}/bin"
          cp build/dubboctl/dubboctl "${DIRNAME}/bin"
          cp build/dubboctl/README.md build/dubboctl/LICENSE "${DIRNAME}"
          ls -Rlh "${DIRNAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${FILENAME}.zip" "${DIRNAME}/bin"
            echo "name=${FILENAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czvf "${FILENAME}.tar.gz" "${DIRNAME}"
            echo "name=${FILENAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Package dubbo distribution
        id: package_dubbo
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FILENAME="dubbo-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          DIRNAME="dubbo-${VERSION}"
          mkdir -p "${DIRNAME}/bin"
          cp build/dubboctl/dubboctl "${DIRNAME}/bin/"
          cp build/README.md build/LICENSE "${DIRNAME}"
          cp -r build/samples "${DIRNAME}"
          ls -Rlh "${DIRNAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${FILENAME}.zip" "${DIRNAME}"
            echo "name=${FILENAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czvf "${FILENAME}.tar.gz" "${DIRNAME}"
            echo "name=${FILENAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        run: |
          sha256sum "${{ steps.package_ctl.outputs.name }}" > "${{ steps.package_ctl.outputs.name }}.sha256"
          sha256sum "${{ steps.package_dubbo.outputs.name }}" > "${{ steps.package_dubbo.outputs.name }}.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "${TAG}" --clobber \
            "${{ steps.package_ctl.outputs.name }}" \
            "${{ steps.package_ctl.outputs.name }}.sha256" \
            "${{ steps.package_dubbo.outputs.name }}" \
            "${{ steps.package_dubbo.outputs.name }}.sha256"

  publish_image:
    name: Publish Multi-Architecture Image
    needs: create_release
    if: github.repository == 'apache/dubbo-kubernetes'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}/dubbod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: |
          BUILDER="release-builder-${GITHUB_RUN_ID}"
          docker buildx create \
            --name "${BUILDER}" \
            --driver docker-container \
            --use \
            --bootstrap
          echo "BUILDER=${BUILDER}" >> "${GITHUB_ENV}"

      - name: Log in to GitHub Container Registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GH_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push versioned image
        id: build_image
        env:
          TAG: ${{ github.ref_name }}
          REVISION: ${{ github.sha }}
        run: |
          METADATA="${RUNNER_TEMP}/build-metadata.json"
          docker buildx build \
            --builder "${BUILDER}" \
            --file dubbod/discovery/docker/dockerfile.dubbod \
            --platform linux/amd64,linux/arm64 \
            --push \
            --tag "${IMAGE}:${TAG}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${REVISION}" \
            --label "org.opencontainers.image.version=${TAG}" \
            --build-arg "GIT_VERSION=${TAG}" \
            --provenance=mode=max \
            --sbom=true \
            --metadata-file "${METADATA}" \
            .

          DIGEST=$(jq -r '."containerimage.digest" // empty' "${METADATA}")
          if [[ ! "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Docker Buildx did not return a valid image digest: ${DIGEST}" >&2
            exit 1
          fi
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        env:
          COSIGN_VERSION: v3.0.6
          COSIGN_SHA256: c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
        run: |
          COSIGN="${RUNNER_TEMP}/cosign"
          curl --retry 3 --fail --silent --show-error --location \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            --output "${COSIGN}"
          echo "${COSIGN_SHA256}  ${COSIGN}" | sha256sum --check
          chmod +x "${COSIGN}"
          echo "COSIGN=${COSIGN}" >> "${GITHUB_ENV}"

      - name: Sign image digest with GitHub OIDC
        env:
          DIGEST: ${{ steps.build_image.outputs.digest }}
        run: |
          "${COSIGN}" sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify image signature
        env:
          DIGEST: ${{ steps.build_image.outputs.digest }}
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yaml@${{ github.ref }}
        run: |
          "${COSIGN}" verify \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"

      - name: Clean up container registry session and builder
        if: always()
        run: |
          docker logout ghcr.io || true
          if [ -n "${BUILDER:-}" ]; then
            docker buildx rm "${BUILDER}" || true
          fi

  package_charts:
    name: Package Helm Charts
    needs: create_release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        run: tools/ci/install-helm.sh v3.16.4

      - name: Lint, package, and verify charts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-charts
          helm lint manifests/charts/base
          helm lint manifests/charts/dubbod
          helm package manifests/charts/base \
            --version "${TAG}" \
            --app-version "${TAG}" \
            --destination release-charts
          helm package manifests/charts/dubbod \
            --version "${TAG}" \
            --app-version "${TAG}" \
            --destination release-charts
          helm template dubbod "release-charts/dubbod-${TAG}.tgz" \
            --set global.proxyless.cni.enabled=false \
            | grep -F "image: \"ghcr.io/apache/dubbo-kubernetes/dubbod:${TAG}\""
          (
            cd release-charts
            sha256sum "base-${TAG}.tgz" > "base-${TAG}.tgz.sha256"
            sha256sum "dubbod-${TAG}.tgz" > "dubbod-${TAG}.tgz.sha256"
          )

      - name: Upload chart assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "${TAG}" --clobber release-charts/*
