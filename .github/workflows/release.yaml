name: Dubbo Kubernetes Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        run: |
          python3 tools/release_notes/generate_release_notes.py \
            --tag "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --release-body release-notes.md

      - name: Create or Update GitHub Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const body = fs.readFileSync('release-notes.md', 'utf8');
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: tag,
                body,
                draft: false,
                prerelease: true,
              });
            } catch (e) {
              if (e.status !== 404) throw e;
              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body,
                draft: false,
                prerelease: true,
              });
            }
            core.setOutput('upload_url', release.data.upload_url);

      - name: Upload Release Notes Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 30

  sync_kdubbo_docs:
    name: Sync Kdubbo Docs Release Notes
    needs: create_release
    runs-on: ubuntu-latest
    env:
      KDUBBO_DOCS_TOKEN: ${{ secrets.KDUBBO_DOCS_TOKEN }}
      KDUBBO_DOCS_REPOSITORY: ${{ vars.KDUBBO_DOCS_REPOSITORY || 'kdubbo/kdubbo.github.io' }}

    steps:
      - name: Require docs token
        run: |
          if [ -z "${KDUBBO_DOCS_TOKEN}" ]; then
            echo "::error::KDUBBO_DOCS_TOKEN is required to push release notes to ${KDUBBO_DOCS_REPOSITORY}"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout kdubbo docs
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KDUBBO_DOCS_REPOSITORY }}
          token: ${{ env.KDUBBO_DOCS_TOKEN }}
          path: kdubbo-docs

      - name: Generate kdubbo docs release notes
        run: |
          python3 tools/release_notes/generate_release_notes.py \
            --tag "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --docs-root kdubbo-docs/docs \
            --release-body release-notes.md

      - name: Verify kdubbo docs
        working-directory: kdubbo-docs
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m mkdocs build --strict --site-dir /tmp/kdubbo-site-build

      - name: Commit kdubbo docs release notes
        working-directory: kdubbo-docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/latest/release
          if git diff --cached --quiet; then
            echo "No kdubbo docs release note changes to commit."
            exit 0
          fi
          git commit -m "docs: add ${GITHUB_REF_NAME} release notes"
          git push

  build_and_upload:
    name: Build and Upload Binaries
    needs: create_release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [386, amd64, arm64]
        exclude:
          - goos: darwin
            goarch: 386
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Dubboctl Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GIT_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p build/cli
          make build-dubboctl GOOS=${GOOS} GOARCH=${GOARCH} GIT_VERSION=${GIT_VERSION}
          cp README.md LICENSE build/cli/
          mv bin/dubboctl* build/cli/
          ls -ln build/cli/

      - name: Dubbo Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GIT_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p build/cli
          make build-dubboctl GOOS=${GOOS} GOARCH=${GOARCH} GIT_VERSION=${GIT_VERSION}
          make clone-sample GOOS=${GOOS} GOARCH=${GOARCH} GIT_VERSION=${GIT_VERSION}
          cp README.md LICENSE build/
          mv bin/dubboctl* build/cli/
          mv bin/samples/ build/
          ls -ln build/cli/ ; ls -ln build/

      - name: Dubboctl Rename windows
        if: matrix.goos == 'windows'
        run: |
          cp build/cli/dubboctl build/cli/dubboctl.exe

      - name: dubboctl Package files
        id: package_ctl
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FILENAME=dubboctl-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}
          DIRNAME=dubboctl-${VERSION}
          mkdir -p ${DIRNAME}/bin
          cp build/cli/dubboctl ${DIRNAME}/bin
          ls -ln ${DIRNAME}/bin
          cp build/cli/README.md build/cli/LICENSE ${DIRNAME}
          ls -Rlh ${DIRNAME}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r ${FILENAME}.zip ${DIRNAME}/bin
            echo "name=${FILENAME}.zip" >> $GITHUB_OUTPUT
          else
            tar -czvf ${FILENAME}.tar.gz ${DIRNAME}
            echo "name=${FILENAME}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: dubbo Package files
        id: package_dubbo
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          FILENAME=dubbo-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}
          DIRNAME=dubbo-${VERSION}
          mkdir -p ${DIRNAME}/bin
          cp build/cli/dubboctl ${DIRNAME}/bin/
          cp build/README.md build/LICENSE ${DIRNAME}
          cp -r build/samples ${DIRNAME}
          ls -Rlh ${DIRNAME}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r ${FILENAME}.zip ${DIRNAME}
            echo "name=${FILENAME}.zip" >> $GITHUB_OUTPUT
          else
            tar -czvf ${FILENAME}.tar.gz ${DIRNAME}
            echo "name=${FILENAME}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload Dubboctl Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ${{ steps.package_ctl.outputs.name }}
          asset_name: ${{ steps.package_ctl.outputs.name }}
          asset_content_type: application/octet-stream

      - name: Upload Dubbo Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ${{ steps.package_dubbo.outputs.name }}
          asset_name: ${{ steps.package_dubbo.outputs.name }}
          asset_content_type: application/octet-stream
