# Prow-style slash commands for issues and pull requests:
#
#   /assign [@user ...]    assign the issue/PR (self-assign needs no permission;
#                          assigning others requires write access)
#   /unassign [@user ...]  remove assignees
#   /lgtm                  (PR only) only an approver in the root OWNERS file
#                          can record Maintainer Approval. The PR is squash
#                          merged immediately when CI is green, or by the
#                          workflow-run handler when CI finishes.
#   /lgtm cancel           remove the `lgtm` label and reset approval
#   /close                 close the issue/PR (author or write access)
#   /reopen                reopen the issue/PR (author or write access)
#   /retest                (PR only, write access) re-run failed workflow runs
#                          for the PR head commit
#
# Bot identity: if the BOT_APP_ID / BOT_APP_PRIVATE_KEY secrets are configured
# (a GitHub App whose avatar is the Apache Dubbo logo, registered through ASF
# INFRA), all replies and merges are performed as that App, so comments show
# the Apache logo. Without them the workflow falls back to the built-in
# GITHUB_TOKEN and appears as github-actions[bot] — the avatar of the built-in
# token cannot be customized.

name: Slash Commands

on:
  issue_comment:
    types:
      - created
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request to reconsider for an approved merge
        required: true
        type: number

permissions:
  checks: read
  contents: write
  issues: write
  pull-requests: write
  actions: write
  statuses: write

jobs:
  command:
    name: Handle Command
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'issue_comment' &&
      github.repository == 'apache/dubbo-kubernetes' &&
      startsWith(github.event.comment.body, '/')
    env:
      BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
    steps:
      # Use a GitHub App identity (Apache logo avatar) when configured.
      - name: Generate bot token
        id: bot-token
        if: env.BOT_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      # Keep the required status tied to the built-in GitHub Actions App even
      # when slash-command comments and merges use a custom bot identity.
      - name: Record maintainer approval
        if: github.event.issue.pull_request
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const firstLine = (context.payload.comment.body || '').trim().split(/\r?\n/)[0].trim();
            const match = firstLine.match(/^\/lgtm(?:\s+(cancel))?\s*$/i);
            if (!match) return;

            const {owner, repo} = context.repo;
            const pullNumber = context.payload.issue.number;
            const {data: pr} = await github.rest.pulls.get({owner, repo, pull_number: pullNumber});
            const cancelled = !!match[1];
            if (!cancelled && context.actor.toLowerCase() !== 'mfordjody') return;
            if (cancelled && context.actor.toLowerCase() !== pr.user.login.toLowerCase()) {
              try {
                const {data: permission} = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: context.actor,
                });
                if (!['admin', 'maintain', 'write'].includes(permission.permission)) return;
              } catch (error) {
                core.info(`Approval cancellation denied: ${error.message}`);
                return;
              }
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: pr.head.sha,
              state: cancelled ? 'pending' : 'success',
              context: 'Maintainer Approval Gate',
              description: cancelled
                ? 'Maintainer approval cancelled'
                : 'Approved by @mfordjody via /lgtm',
              target_url: pr.html_url,
            });

      - name: Dispatch command
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.bot-token.outputs.token || github.token }}
          script: |
            const {owner, repo} = context.repo;
            const comment = context.payload.comment;
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const commenter = comment.user.login;
            const isPR = !!issue.pull_request;

            const firstLine = (comment.body || '').trim().split(/\r?\n/)[0].trim();
            const match = firstLine.match(/^\/(assign|unassign|lgtm|close|reopen|retest)\b(.*)$/);
            if (!match) {
              core.info(`No supported command in: ${firstLine}`);
              return;
            }
            const command = match[1];
            const args = match[2].trim();
            core.info(`Command /${command} ${args} from @${commenter} on #${issueNumber}`);

            const reply = async (body) => {
              await github.rest.issues.createComment({owner, repo, issue_number: issueNumber, body});
            };
            const hasWriteAccess = async (username) => {
              try {
                const {data} = await github.rest.repos.getCollaboratorPermissionLevel({owner, repo, username});
                return ['admin', 'maintain', 'write'].includes(data.permission);
              } catch (e) {
                return false;
              }
            };
            const ack = async (content) => {
              try {
                await github.rest.reactions.createForIssueComment({owner, repo, comment_id: comment.id, content});
              } catch (e) {
                core.info(`reaction failed: ${e.message}`);
              }
            };
            // Approvers come from the `approvers:` list in the root OWNERS
            // file on the default branch; only they can merge via /lgtm.
            const getApprovers = async () => {
              try {
                const {data} = await github.rest.repos.getContent({owner, repo, path: 'OWNERS'});
                const text = Buffer.from(data.content, 'base64').toString('utf8');
                const approvers = [];
                let inApprovers = false;
                for (const raw of text.split(/\r?\n/)) {
                  const line = raw.replace(/#.*$/, '').trimEnd();
                  if (/^approvers:\s*$/.test(line)) { inApprovers = true; continue; }
                  if (/^\S/.test(line)) { inApprovers = false; }
                  const item = line.match(/^\s*-\s*['"]?([A-Za-z0-9-]+)['"]?\s*$/);
                  if (inApprovers && item) approvers.push(item[1].toLowerCase());
                }
                return approvers;
              } catch (e) {
                core.info(`OWNERS not readable: ${e.message}`);
                return [];
              }
            };

            switch (command) {
              case 'assign':
              case 'unassign': {
                const targets = args
                  ? args.split(/\s+/).map((u) => u.replace(/^@/, '')).filter(Boolean)
                  : [commenter];
                const touchesOthers = targets.some((t) => t.toLowerCase() !== commenter.toLowerCase());
                if (touchesOthers && !(await hasWriteAccess(commenter))) {
                  await reply(`@${commenter}: only collaborators with write access can ${command} other users.`);
                  return;
                }
                try {
                  if (command === 'assign') {
                    await github.rest.issues.addAssignees({owner, repo, issue_number: issueNumber, assignees: targets});
                  } else {
                    await github.rest.issues.removeAssignees({owner, repo, issue_number: issueNumber, assignees: targets});
                  }
                  await ack('+1');
                } catch (e) {
                  await reply(`@${commenter}: failed to ${command} ${targets.map((t) => '@' + t).join(' ')}: ${e.message}\n\nNote: assignees must be collaborators or org members with read access.`);
                }
                return;
              }

              case 'lgtm': {
                if (!isPR) {
                  await reply(`@${commenter}: \`/lgtm\` can only be used on pull requests.`);
                  return;
                }
                if (args.toLowerCase() === 'cancel') {
                  if (!(await hasWriteAccess(commenter)) && commenter !== issue.user.login) {
                    await reply(`@${commenter}: only collaborators with write access or the PR author can cancel lgtm.`);
                    return;
                  }
                  try {
                    await github.rest.issues.removeLabel({owner, repo, issue_number: issueNumber, name: 'lgtm'});
                  } catch (e) {
                    core.info(`label removal: ${e.message}`);
                  }
                  const {data: pr} = await github.rest.pulls.get({owner, repo, pull_number: issueNumber});
                  if (pr.auto_merge) {
                    await github.graphql(
                      `mutation($id: ID!) { disablePullRequestAutoMerge(input: {pullRequestId: $id}) { pullRequest { number } } }`,
                      {id: pr.node_id},
                    );
                  }
                  await ack('+1');
                  return;
                }
                if (!(await hasWriteAccess(commenter))) {
                  await reply(`@${commenter}: only collaborators with write access can \`/lgtm\` a pull request.`);
                  return;
                }

                const approvers = await getApprovers();
                if (!approvers.includes(commenter.toLowerCase())) {
                  const who = approvers.length
                    ? approvers.map((a) => '@' + a).join(', ')
                    : 'nobody (OWNERS file missing or empty)';
                  await reply(`@${commenter}: merging requires \`/lgtm\` from an approver in the OWNERS file: ${who}.`);
                  return;
                }

                try {
                  await github.rest.issues.createLabel({owner, repo, name: 'lgtm', color: '15dd18', description: 'Looks good to me, ready to merge'});
                } catch (e) {
                  core.info(`label exists: ${e.message}`);
                }
                await github.rest.issues.addLabels({owner, repo, issue_number: issueNumber, labels: ['lgtm']});
                await ack('+1');

                const {data: pr} = await github.rest.pulls.get({owner, repo, pull_number: issueNumber});
                if (pr.merged) {
                  return;
                }
                try {
                  await github.rest.pulls.merge({
                    owner,
                    repo,
                    pull_number: issueNumber,
                    merge_method: 'squash',
                    sha: pr.head.sha,
                  });
                  await reply(`Merged on behalf of @${commenter} via \`/lgtm\`.`);
                } catch (mergeErr) {
                  core.info(`Merge deferred until CI finishes: ${mergeErr.message}`);
                  await github.rest.actions.createWorkflowDispatch({
                    owner,
                    repo,
                    workflow_id: 'commands.yml',
                    ref: pr.base.ref,
                    inputs: {pr_number: String(pr.number)},
                  });
                  await reply(`\`/lgtm\` recorded by @${commenter}. The PR will be squash merged automatically after required CI passes.`);
                }
                return;
              }

              case 'close':
              case 'reopen': {
                if (commenter !== issue.user.login && !(await hasWriteAccess(commenter))) {
                  await reply(`@${commenter}: only the author or collaborators with write access can ${command} this.`);
                  return;
                }
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber,
                  state: command === 'close' ? 'closed' : 'open',
                });
                await ack('+1');
                return;
              }

              case 'retest': {
                if (!isPR) {
                  await reply(`@${commenter}: \`/retest\` can only be used on pull requests.`);
                  return;
                }
                if (!(await hasWriteAccess(commenter)) && commenter !== issue.user.login) {
                  await reply(`@${commenter}: only the PR author or collaborators with write access can \`/retest\`.`);
                  return;
                }
                const {data: pr} = await github.rest.pulls.get({owner, repo, pull_number: issueNumber});
                const {data: runs} = await github.rest.actions.listWorkflowRunsForRepo({
                  owner, repo, head_sha: pr.head.sha, per_page: 100,
                });
                const failed = runs.workflow_runs.filter((r) =>
                  r.status === 'completed' && ['failure', 'cancelled', 'timed_out'].includes(r.conclusion));
                if (failed.length === 0) {
                  await reply(`@${commenter}: no failed workflow runs found for ${pr.head.sha.substring(0, 7)}.`);
                  return;
                }
                for (const run of failed) {
                  try {
                    await github.rest.actions.reRunWorkflowFailedJobs({owner, repo, run_id: run.id});
                  } catch (e) {
                    core.info(`re-run ${run.name}: ${e.message}`);
                  }
                }
                await ack('rocket');
                return;
              }
            }

  merge-approved:
    name: Merge Approved Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.repository == 'apache/dubbo-kubernetes' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion == 'success'))
    steps:
      - name: Merge current-head pull request approved via /lgtm
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            let headSha;
            let candidates;
            if (context.eventName === 'workflow_dispatch') {
              const pullNumber = Number(context.payload.inputs.pr_number);
              const {data: pr} = await github.rest.pulls.get({owner, repo, pull_number: pullNumber});
              headSha = pr.head.sha;
              candidates = [pr];
            } else {
              headSha = context.payload.workflow_run.head_sha;
              const {data: associated} = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: headSha,
              });
              candidates = associated.filter((pr) =>
                pr.state === 'open' &&
                pr.head.sha === headSha &&
                ['master', 'main'].includes(pr.base.ref),
              );
            }

            for (const candidate of candidates) {
              const {data: pr} = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: candidate.number,
              });
              const labels = new Set(pr.labels.map((label) => label.name));
              if (pr.state !== 'open' || pr.head.sha !== headSha ||
                  !['master', 'main'].includes(pr.base.ref) || !labels.has('lgtm')) {
                core.info(`#${pr.number}: missing lgtm label`);
                continue;
              }

              const {data: combined} = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: headSha,
              });
              const approval = combined.statuses.find((status) =>
                status.context === 'Maintainer Approval Gate',
              );
              if (approval?.state !== 'success') {
                core.info(`#${pr.number}: maintainer approval is ${approval?.state || 'missing'}`);
                continue;
              }

              const {data: checks} = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              });
              const requiredCI = checks.check_runs.find((check) =>
                check.name === 'CI Required' && check.app?.slug === 'github-actions',
              );
              if (requiredCI?.conclusion !== 'success') {
                core.info(`#${pr.number}: CI Required is ${requiredCI?.conclusion || requiredCI?.status || 'missing'}`);
                continue;
              }

              try {
                const {data: result} = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  sha: headSha,
                });
                if (!result.merged) {
                  core.setFailed(`#${pr.number}: ${result.message}`);
                }
              } catch (error) {
                core.setFailed(`#${pr.number}: ${error.message}`);
              }
            }
