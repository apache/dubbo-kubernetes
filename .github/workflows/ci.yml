name: Dubbo Kubernetes CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GOLANGCI_LINT_VERSION: v2.6.2

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'apache/dubbo-kubernetes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run shellcheck
        run: make lint-shell

  check:
    name: Check Repo Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'apache/dubbo-kubernetes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Check go.mod/go.sum are tidy
        run: make check-tidy

      - name: Check License Header
        uses: apache/skywalking-eyes/header@v0.6.0

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.repository == 'apache/dubbo-kubernetes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run unit tests with race detector and coverage
        run: make test-coverage

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: coverage.txt
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  performance:
    name: Performance Scale Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'apache/dubbo-kubernetes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Exercise representative xDS push scale
        run: make benchmark-smoke

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'apache/dubbo-kubernetes'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build all binaries
        run: make build GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Compile tests (vet whole tree)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go build ./...

  helm:
    name: Helm Charts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'apache/dubbo-kubernetes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        run: tools/ci/install-helm.sh v3.16.4

      - name: Lint and render charts
        run: make lint-helm

  e2e:
    name: E2E Smoke (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.repository == 'apache/dubbo-kubernetes'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        run: tools/ci/install-helm.sh v3.16.4

      - name: Install kind
        run: tools/ci/install-kind.sh v0.30.0

      - name: Run e2e smoke test
        env:
          UPGRADE_FROM_VERSION: '0.4.3'
        run: make test-e2e

  required:
    name: CI Required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - lint
      - check
      - unit-test
      - performance
      - build
      - helm
      - e2e
    steps:
      - name: Verify required jobs passed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          CHECK_RESULT: ${{ needs.check.result }}
          UNIT_TEST_RESULT: ${{ needs.unit-test.result }}
          PERFORMANCE_RESULT: ${{ needs.performance.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          HELM_RESULT: ${{ needs.helm.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          failed=0
          for job_result in \
            "lint=${LINT_RESULT}" \
            "check=${CHECK_RESULT}" \
            "unit-test=${UNIT_TEST_RESULT}" \
            "performance=${PERFORMANCE_RESULT}" \
            "build=${BUILD_RESULT}" \
            "helm=${HELM_RESULT}" \
            "e2e=${E2E_RESULT}"; do
            job="${job_result%%=*}"
            result="${job_result#*=}"
            echo "${job}: ${result}"
            if [[ "${result}" != "success" ]]; then
              failed=1
            fi
          done
          if [[ "${failed}" -ne 0 ]]; then
            echo "Required CI job did not succeed." >&2
            exit 1
          fi
