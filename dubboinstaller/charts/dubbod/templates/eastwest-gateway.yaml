{{- $defaults := .Values._internal_default_values_not_set | default dict }}
{{- $defaultGlobal := $defaults.global | default dict }}
{{- $defaultMulticluster := $defaultGlobal.multicluster | default dict }}
{{- $defaultEastWestGateway := $defaultMulticluster.eastWestGateway | default dict }}
{{- $global := .Values.global | default dict }}
{{- $multicluster := $global.multicluster | default dict }}
{{- $eastWestGateway := $multicluster.eastWestGateway | default dict }}
{{- $eastWestGatewayEnabled := coalesce $eastWestGateway.enabled $defaultEastWestGateway.enabled false }}
{{- if $eastWestGatewayEnabled }}
{{- $serviceType := coalesce $eastWestGateway.serviceType $defaultEastWestGateway.serviceType "LoadBalancer" }}
{{- $port := int (coalesce $eastWestGateway.port $defaultEastWestGateway.port 15443) }}
{{- $targetPort := int (coalesce $eastWestGateway.targetPort $defaultEastWestGateway.targetPort 15080) }}
{{- $nodePort := int (coalesce $eastWestGateway.nodePort $defaultEastWestGateway.nodePort 0) }}
{{- $xdsAddress := coalesce $eastWestGateway.xdsAddress $defaultEastWestGateway.xdsAddress "" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dubbod-eastwest-gateway
  namespace: dubbo-system
  labels:
    app: dubbod-eastwest-gateway
    gateway.dubbo.apache.org/eastwest: "true"
  annotations:
    gateway.dubbo.apache.org/eastwest: "true"
    gateway.dubbo.apache.org/service-type: {{ $serviceType | quote }}
    gateway.dubbo.apache.org/target-port: {{ $targetPort | quote }}
{{- if $xdsAddress }}
    gateway.dubbo.apache.org/xds-address: {{ $xdsAddress | quote }}
{{- end }}
{{- if gt $nodePort 0 }}
    gateway.dubbo.apache.org/node-port: {{ $nodePort | quote }}
{{- end }}
spec:
  gatewayClassName: dubbo
  listeners:
  - name: http-eastwest
    protocol: HTTP
    port: {{ $port }}
    allowedRoutes:
      namespaces:
        from: All
{{- end }}
