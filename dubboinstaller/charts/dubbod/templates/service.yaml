{{- $defaults := .Values._internal_default_values_not_set | default dict }}
{{- $defaultGlobal := $defaults.global | default dict }}
{{- $defaultGUI := $defaultGlobal.gui | default dict }}
{{- $global := .Values.global | default dict }}
{{- $gui := $global.gui | default dict }}
{{- $guiPort := int (coalesce $gui.port $defaultGUI.port 26080) }}
{{- $guiNodePort := int (coalesce $gui.nodePort $defaultGUI.nodePort 30080) }}
apiVersion: v1
kind: Service
metadata:
  name: dubbod
  namespace: dubbo-system
  labels:
    app: dubbod
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
    prometheus.io/scrape: "true"
spec:
  ports:
    - port: 8080
      name: http-monitoring
      protocol: TCP
    - port: 26010
      name: grpc-xds
      protocol: TCP
    - port: 26012
      name: https-dns
      protocol: TCP
    - port: 443
      name: https-webhook
      targetPort: 26017
      protocol: TCP
  selector:
    app: dubbod
---
apiVersion: v1
kind: Service
metadata:
  name: dubbod-gui
  namespace: dubbo-system
  labels:
    app: dubbod
spec:
  type: NodePort
  ports:
    - port: {{ $guiPort }}
      name: gui
      targetPort: {{ $guiPort }}
      nodePort: {{ $guiNodePort }}
      protocol: TCP
  selector:
    app: dubbod
