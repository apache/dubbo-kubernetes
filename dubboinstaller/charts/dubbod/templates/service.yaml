apiVersion: v1
kind: Service
metadata:
  name: dubbod
  namespace: dubbo-system
  labels:
    app: dubbod
spec:
  ports:
    - port: 15010
      name: grpc-xds
      protocol: TCP
    - port: 15012
      name: https-dns
      protocol: TCP
    - port: 443
      name: https-webhook
      targetPort: 15017
      protocol: TCP
  selector:
    app: dubbod
---
apiVersion: v1
kind: Service
metadata:
  name: dubbod-gui
  namespace: dubbo-system
  labels:
    app: dubbod
spec:
  type: NodePort
  ports:
    - port: 15080
      name: gui
      targetPort: 15080
      nodePort: 30080
      protocol: TCP
  selector:
    app: dubbod
