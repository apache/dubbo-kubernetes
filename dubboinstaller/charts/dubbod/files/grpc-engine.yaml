metadata:
  annotations:
    dubbo.apache.org/rev: default
    inject.dubbo.apache.org/templates: grpc-engine
spec:
  containers:
  - name: app
    env:
    - name: GRPC_XDS_BOOTSTRAP
      value: /etc/dubbo/proxy/grpc-bootstrap.json
    - name: XDS_ADDRESS
      value: dubbod.dubbo-system.svc:15012
    - name: GRPC_XDS_EXPERIMENTAL_SECURITY_SUPPORT
      value: "true"
    - name: DUBBO_GRPC_XDS_CREDENTIALS
      value: "true"
    - name: DUBBO_GRPC_XDS_RESOLVER
      value: "xds:///"
    - name: DUBBO_META_GENERATOR
      value: "grpc"
    - name: DUBBO_META_CLUSTER_ID
      value: Kubernetes
    - name: DUBBO_META_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: CA_ADDRESS
      value: dubbod.dubbo-system.svc:15012
    - name: DUBBO_META_MESH_ID
      value: cluster.local
    - name: TRUST_DOMAIN
      value: cluster.local
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: INSTANCE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: SERVICE_ACCOUNT
      valueFrom:
        fieldRef:
          fieldPath: spec.serviceAccountName
    - name: HOST_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
{{- if and (gt (len .Spec.Containers) 0) (contains "kdubbo/dubbod" ((index .Spec.Containers 0).Image | default "")) }}
    args:
    - xds-client
    - --watch
{{- end }}
    volumeMounts:
    - name: dubbo-xds
      mountPath: /etc/dubbo/proxy
      readOnly: true
  volumes:
  - name: dubbo-xds
    secret:
      secretName: dubbo-xds
      defaultMode: 420
