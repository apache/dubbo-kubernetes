metadata:
  annotations:
    dubbo.apache.org/rev: {{ .Revision | default "default" }}
spec:
  containers:
{{- range .Spec.Containers }}
{{- if and (ne .Name "dubbo-proxy") (ne .Name "dubbo-validation") }}
  - name: {{ .Name | quote }}
    env:
    - name: GRPC_XDS_BOOTSTRAP
      value: {{ proxylessGRPCBootstrapPath | quote }}
    - name: GRPC_XDS_EXPERIMENTAL_SECURITY_SUPPORT
      value: "true"
    - name: DUBBO_GRPC_XDS_CREDENTIALS
      value: "true"
    - name: DUBBO_GRPC_XDS_RESOLVER
      value: "xds:///"
    - name: DUBBO_META_GENERATOR
      value: "grpc"
    - name: DUBBO_META_CLUSTER_ID
      value: "Kubernetes"
    - name: DUBBO_META_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: CA_ADDR
      value: {{ proxylessGRPCDiscoveryAddress $.MeshGlobalConfig $.ProxyConfig | quote }}
    - name: DUBBO_META_MESH_ID
      value: {{ proxylessGRPCTrustDomain $.MeshGlobalConfig | quote }}
    - name: TRUST_DOMAIN
      value: {{ proxylessGRPCTrustDomain $.MeshGlobalConfig | quote }}
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: INSTANCE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: SERVICE_ACCOUNT
      valueFrom:
        fieldRef:
          fieldPath: spec.serviceAccountName
    - name: HOST_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    volumeMounts:
    - name: {{ proxylessXDSVolumeName | quote }}
      mountPath: {{ proxylessXDSMountPath | quote }}
      readOnly: true
{{- end }}
{{- end }}
  volumes:
  - name: {{ proxylessXDSVolumeName | quote }}
    secret:
      secretName: {{ proxylessGRPCSecretName .ObjectMeta.Name | quote }}
      defaultMode: 420
