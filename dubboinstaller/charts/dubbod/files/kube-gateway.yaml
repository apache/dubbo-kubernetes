apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .DeploymentName }}-bootstrap
  namespace: {{ .Gateway.Namespace }}
  labels:
    app.kubernetes.io/name: dxgate
    app.kubernetes.io/instance: {{ .DeploymentName }}
    app.kubernetes.io/managed-by: dubbod
    gateway.networking.k8s.io/gateway-name: {{ .Gateway.Name }}
data:
  bootstrap.json: |
{{ .BootstrapConfig | indent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .ServiceAccount }}
  namespace: {{ .Gateway.Namespace }}
  labels:
    app.kubernetes.io/name: dxgate
    app.kubernetes.io/instance: {{ .DeploymentName }}
    app.kubernetes.io/managed-by: dubbod
    gateway.networking.k8s.io/gateway-name: {{ .Gateway.Name }}
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .DeploymentName }}
  namespace: {{ .Gateway.Namespace }}
  labels:
    app.kubernetes.io/name: dxgate
    app.kubernetes.io/instance: {{ .DeploymentName }}
    app.kubernetes.io/managed-by: dubbod
    gateway.networking.k8s.io/gateway-name: {{ .Gateway.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dxgate
      app.kubernetes.io/instance: {{ .DeploymentName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dxgate
        app.kubernetes.io/instance: {{ .DeploymentName }}
        app.kubernetes.io/managed-by: dubbod
        gateway.dubbo.apache.org/managed: dubbo.apache.org-gateway-controller
        gateway.networking.k8s.io/gateway-name: {{ .Gateway.Name }}
      annotations:
        dubbo.apache.org/rev: {{ .Revision | quote }}
        gateway.dubbo.apache.org/bootstrap-hash: {{ .BootstrapConfigHash | quote }}
    spec:
      serviceAccountName: {{ .ServiceAccount }}
      containers:
      - name: dxgate
        image: {{ .DxgateImage }}
        imagePullPolicy: IfNotPresent
        env:
        - name: DXGATE_BOOTSTRAP
          value: /etc/dxgate/bootstrap.json
        - name: DXGATE_HTTP_ADDR
          value: 0.0.0.0:8080
        - name: DXGATE_ADMIN_ADDR
          value: 0.0.0.0:26021
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: INSTANCE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: KUBE_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - name: http
          containerPort: 8080
        - name: admin
          containerPort: 26021
        readinessProbe:
          httpGet:
            path: /readyz
            port: admin
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: admin
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: bootstrap
          mountPath: /etc/dxgate
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: bootstrap
        configMap:
          name: {{ .DeploymentName }}-bootstrap
          items:
          - key: bootstrap.json
            path: bootstrap.json
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .DeploymentName }}
  namespace: {{ .Gateway.Namespace }}
  labels:
    app.kubernetes.io/name: dxgate
    app.kubernetes.io/instance: {{ .DeploymentName }}
    app.kubernetes.io/managed-by: dubbod
    gateway.networking.k8s.io/gateway-name: {{ .Gateway.Name }}
spec:
  type: {{ .ServiceType }}
  selector:
    app.kubernetes.io/name: dxgate
    app.kubernetes.io/instance: {{ .DeploymentName }}
  ports:
{{- range .Ports }}
  - name: {{ .Name }}
    port: {{ .Port }}
    targetPort: {{ .TargetPort }}
    protocol: {{ .Protocol | default "TCP" }}
{{- end }}
