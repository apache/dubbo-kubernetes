_internal_default_values_not_set:
  revision: ""

  # Number of dubbod replicas. Set >= 2 for a highly available control plane;
  # a PodDisruptionBudget (minAvailable: 1) is created automatically then.
  replicaCount: 1

  global:
    proxy:
      clusterDomain: "cluster.local"

    proxyless:
      cni:
        enabled: true
        # Shared control-plane/CNI image. An empty value resolves to
        # ghcr.io/apache/dubbo-kubernetes/dubbod:<Chart.appVersion>.
        image: ""
        binDir: "/opt/cni/bin"
        confDir: "/etc/cni/net.d"
        stateDir: "/var/run/dubbo-cni"
        grpcInboundPort: 15080
        managedLabel: "proxyless.dubbo.apache.org/managed"
        managedLabelValue: "true"
        iptablesPath: "iptables"
        ipsetPath: "ipset"
        refreshInterval: "1m"

    statusPort: 26020

    gui:
      port: 26080
      nodePort: 30080

    configValidation: true

    multicluster:
      remoteAccess:
        enabled: false
        serviceType: "LoadBalancer"
        grpcPort: 26010
        xdsPort: 26012
        webhookPort: 443
        certificateHosts: []
      eastWestGateway:
        enabled: false
        serviceType: "LoadBalancer"
        port: 15443
        targetPort: 15080
        nodePort: 0
        gateways: []
        xdsAddress: ""
