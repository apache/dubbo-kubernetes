{{- $defaults := .Values._internal_default_values_not_set | default dict }}
{{- $defaultGlobal := $defaults.global | default dict }}
{{- $defaultGUI := $defaultGlobal.gui | default dict }}
{{- $defaultMulticluster := $defaultGlobal.multicluster | default dict }}
{{- $defaultRemoteAccess := $defaultMulticluster.remoteAccess | default dict }}
{{- $defaultEastWestGateway := $defaultMulticluster.eastWestGateway | default dict }}
{{- $global := .Values.global | default dict }}
{{- $gui := $global.gui | default dict }}
{{- $multicluster := $global.multicluster | default dict }}
{{- $remoteAccess := $multicluster.remoteAccess | default dict }}
{{- $eastWestGateway := $multicluster.eastWestGateway | default dict }}
{{- $guiPort := int (coalesce $gui.port $defaultGUI.port 26080) }}
{{- $remoteAccessCertificateHosts := $remoteAccess.certificateHosts | default $defaultRemoteAccess.certificateHosts | default (list) }}
{{- $eastWestGateways := $eastWestGateway.gateways | default $defaultEastWestGateway.gateways | default (list) }}
{{- $eastWestGatewayEntries := list }}
{{- $defaultEastWestGatewayPort := int (coalesce $eastWestGateway.port $defaultEastWestGateway.port 15443) }}
{{- range $gateway := $eastWestGateways }}
{{- $gatewayPort := int (coalesce $gateway.port $defaultEastWestGatewayPort) }}
{{- $eastWestGatewayEntries = append $eastWestGatewayEntries (printf "%s=%s:%d" $gateway.clusterName $gateway.address $gatewayPort) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dubbod
  namespace: dubbo-system
  labels:
    app: dubbod
    dubbo.apache.org/rev: default
spec:
  selector:
    matchLabels:
      app: dubbod
  template:
    metadata:
      labels:
        app: dubbod
    spec:
      serviceAccountName: dubbod
      containers:
        - name: execute
          image: "kdubbo/dubbod:debug"
          imagePullPolicy: IfNotPresent
          args:
            - "execute"
            - --domain
            - cluster.local
            - --guiAddr
            - ":{{ $guiPort }}"
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http-debug
            - containerPort: {{ $guiPort }}
              protocol: TCP
              name: gui
            - containerPort: 26010
              protocol: TCP
              name: grpc-xds
            - containerPort: 26012
              protocol: TCP
              name: tls-xds
            - containerPort: 26017
              protocol: TCP
              name: https-webhooks
          env:
            - name: REVISION
              value: default
            - name: DUBBO_CERT_PROVIDER
              value: dubbod
{{- if gt (len $remoteAccessCertificateHosts) 0 }}
            - name: DUBBOD_CUSTOM_HOST
              value: {{ join "," $remoteAccessCertificateHosts | quote }}
{{- end }}
{{- if gt (len $eastWestGatewayEntries) 0 }}
            - name: DUBBO_EASTWEST_GATEWAYS
              value: {{ join "," $eastWestGatewayEntries | quote }}
{{- end }}
            - name: CLUSTER_ID
              value: "Kubernetes"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.serviceAccountName
          resources:
            requests:
              cpu: 500m
              memory: 2048Mi
          volumeMounts:
          - mountPath: /var/run/secrets/dubbod/ca
            name: dubbo-csr-ca-configmap
            readOnly: true
      volumes:
      - configMap:
          defaultMode: 420
          name: dubbo-ca-root-cert
          optional: true
        name: dubbo-csr-ca-configmap
