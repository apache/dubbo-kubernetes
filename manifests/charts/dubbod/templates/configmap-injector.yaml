apiVersion: v1
kind: ConfigMap
metadata:
  name: dubbo-proxyless-injector
  namespace: dubbo-system
  labels:
    app: dubbod
    dubbo.apache.org/rev: default
data:
  config: |-
    defaultTemplates: [grpc-engine]
    policy: enabled
    templates:
      grpc-engine: |
{{ .Files.Get "files/grpc-engine.yaml" | trim | indent 8 }}
      gateway: |
{{ .Files.Get "files/kube-gateway.yaml" | trim | indent 8 }}
  values: |-
