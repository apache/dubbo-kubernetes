metadata:
  annotations:
    dubbo.apache.org/rev: default
    inject.dubbo.apache.org/templates: grpc-engine
spec:
  containers:
  - name: app
    env:
    - name: GRPC_XDS_BOOTSTRAP
      value: /etc/dubbo/proxy/grpc-bootstrap.json
    - name: XDS_ADDRESS
      value: dubbod.dubbo-system.svc:26012
    - name: GRPC_XDS_EXPERIMENTAL_SECURITY_SUPPORT
      value: "true"
    - name: DUBBO_GRPC_XDS_CREDENTIALS
      value: "true"
    - name: DUBBO_GRPC_XDS_RESOLVER
      value: "xds:///"
    - name: DUBBO_GRPC_KEEPALIVE
      value: "true"
    - name: GRPC_KEEPALIVE_INTERVAL
      value: "30s"
    - name: GRPC_KEEPALIVE_TIMEOUT
      value: "10s"
    - name: GRPC_KEEPALIVE_PERMIT_WITHOUT_STREAM
      value: "true"
    - name: DUBBO_META_GENERATOR
      value: "grpc"
    - name: DUBBO_META_CLUSTER_ID
      value: Kubernetes
    - name: DUBBO_META_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: CA_ADDRESS
      value: dubbod.dubbo-system.svc:26012
    - name: DUBBO_META_MESH_ID
      value: cluster.local
    - name: TRUST_DOMAIN
      value: cluster.local
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: INSTANCE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: SERVICE_ACCOUNT
      valueFrom:
        fieldRef:
          fieldPath: spec.serviceAccountName
    - name: HOST_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
{{- if .TracingDisabled }}
    - name: OTEL_TRACES_EXPORTER
      value: none
{{- else if .TracingOTLPEndpoint }}
    - name: OTEL_TRACES_EXPORTER
      value: otlp
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: grpc
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: {{ .TracingOTLPEndpoint }}
    - name: OTEL_SERVICE_NAME
      value: {{ .DeploymentMeta.Name }}.{{ .DeploymentMeta.Namespace }}
    - name: OTEL_TRACES_SAMPLER
      value: parentbased_traceidratio
    - name: OTEL_TRACES_SAMPLER_ARG
      value: {{ .TracingSamplingRatio | quote }}
{{- end }}
{{- if .TracingResourceAttributes }}
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: {{ .TracingResourceAttributes | quote }}
{{- end }}
{{- if and (gt (len .Spec.Containers) 0) (contains "kdubbo/dubbod" ((index .Spec.Containers 0).Image | default "")) }}
    args:
    - grpc-outbound
    - --watch
{{- end }}
    volumeMounts:
    - name: dubbo-xds
      mountPath: /etc/dubbo/proxy
      readOnly: true
{{- $appPort := 80 }}
{{- if and (gt (len .Spec.Containers) 0) (gt (len ((index .Spec.Containers 0).Ports)) 0) }}
{{- $appPort = int ((index ((index .Spec.Containers 0).Ports) 0).ContainerPort) }}
{{- end }}
  - name: dubbo-grpc-inbound
    image: {{ .ProxyImage | quote }}
    imagePullPolicy: IfNotPresent
    args:
    - grpc-inbound
    - --listen
    - :15080
    - --upstream
    - 127.0.0.1:{{ $appPort }}
    ports:
    - name: grpc-inbound
      containerPort: 15080
      protocol: TCP
    volumeMounts:
    - name: dubbo-xds
      mountPath: /etc/dubbo/proxy
      readOnly: true
  volumes:
  - name: dubbo-xds
    secret:
      secretName: dubbo-xds
      defaultMode: 420
