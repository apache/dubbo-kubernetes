apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dubbo-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dubbo-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dubbo-observability
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dubbo-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dubbo-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dubbo-prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: dubbo-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dubbo-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090

    - job_name: dubbod
      metrics_path: /metrics
      static_configs:
      - targets:
        - dubbod.dubbo-system.svc:8080
        labels:
          app: dubbod
          namespace: dubbo-system

    - job_name: kubernetes-pods
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        target_label: app
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dubbo-observability
spec:
  ports:
  - name: http
    port: 9090
    protocol: TCP
    targetPort: 9090
  selector:
    app.kubernetes.io/name: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: dubbo-system
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dubbo-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: dubbo-observability
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v3.5.0
        imagePullPolicy: IfNotPresent
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.enable-lifecycle
        ports:
        - name: http
          containerPort: 9090
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 15
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
          readOnly: true
        - name: storage
          mountPath: /prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus
      - name: storage
        emptyDir: {}
