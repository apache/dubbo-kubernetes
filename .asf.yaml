notifications:
    commits:      commits@dubbo.apache.org
    issues:       notifications@dubbo.apache.org
    pullrequests: notifications@dubbo.apache.org

github:
  homepage: "https://kdubbo.github.io"
  description: "Build a native mesh using gRPC and xDS"
  labels:
    - dubbo
    - consul
    - kubernetes
    - service-mesh
    - microservice
    - microservices
  features:
    # Enable issue management
    issues: true
    # Enable projects for project management boards
    projects: false
    # Enable wiki for documentation
    wiki: false
  protected_branches:
    master:
      required_status_checks:
        strict: true
        contexts:
          # This stable aggregate check fails unless every required CI job passes.
          - CI Required
  rulesets:
    # Stage the review policy on an isolated branch before targeting master.
    - name: "Solo Maintainer Review Gate"
      target: branch
      enforcement: active
      bypass_actors:
        - actor_id: 91593982
          actor_type: User
          bypass_mode: pull_request
      conditions:
        ref_name:
          include:
            - "refs/heads/policy/ruleset-sandbox"
          exclude: []
      rules:
        - type: deletion
        - type: non_fast_forward
        - type: pull_request
          parameters:
            dismiss_stale_reviews_on_push: true
            require_code_owner_review: true
            require_last_push_approval: false
            required_approving_review_count: 1
            required_review_thread_resolution: true
